<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BURGERMAN</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="home-page">


    <!-- LOGO TOP RIGHT -->

    <img src="assets/logo.png"
         class="brand-logo"
         alt="BurgerMan Logo">



    <!-- RESTAURANT NAME -->

    <h1 class="brand-name">
        BURGERMAN
    </h1>



    <!-- TAGLINE -->

    <p class="tagline">
        "Burgers Made Fresh, Served Your Way"
    </p>



    <!-- MAIN BURGER IMAGE -->

    <img src="assets/burger-home.png"
         class="home-burger"
         alt="Burger Image">





    <!-- ORDER BUTTON -->

    <div class="order-button-container">

        <button class="order-btn"
        onclick="openMenu()">

            YOUR ORDER LIST

        </button>

    </div>



</div>



<script>

function openMenu()
{
    window.location.href="menu.html";
}

</script>


</body>

</html>
