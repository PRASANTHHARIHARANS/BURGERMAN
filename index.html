<!DOCTYPE html>

<html lang="en">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>

BURGERMAN

</title>



<link rel="stylesheet" href="style.css">


</head>





<body>





<div class="home-page">







<!-- ==========================
     BRAND LOGO TOP RIGHT
========================== -->



<img

src="image/logo.png"

class="brand-logo"

alt="BURGERMAN Logo">









<!-- ==========================
     HERO SECTION
========================== -->


<section class="hero-section">





<img

src="image/burger.jpg"

class="hero-burger"

alt="Burger Image">







<h1 class="brand-name">


BURGERMAN


</h1>







<p class="tagline">


Taste the difference, one bite at a time


</p>






</section>









<!-- ==========================
     MENU BUTTON
========================== -->



<div class="menu-btn-container">





<button


class="menu-btn"


onclick="goToMenu()">



MENU



</button>







</div>









</div>









<script src="script.js"></script>



</body>


</html>
