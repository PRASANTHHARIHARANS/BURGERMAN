<!DOCTYPE html>

<html lang="en">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>

BURGERMAN | Menu

</title>



<link rel="stylesheet" href="style.css">


</head>





<body>





<div class="menu-page">







<!-- ===========================
     HEADER
=========================== -->


<header class="menu-header">



<div class="brand">



<h1>

BURGERMAN

</h1>




<p>

Choose Your Favourite Burger

</p>



</div>







<button

class="back-btn"

onclick="goToHome()">



← Home



</button>



</header>









<!-- ===========================
     MENU TITLE
=========================== -->


<h1 class="menu-title">


BURGER MENU


</h1>









<!-- ===========================
     CATEGORY BUTTONS
=========================== -->


<div class="category-buttons">





<button


class="category-btn active"


onclick="filterMenu('all',this)">



🍔 ALL BURGERS



</button>









<button


class="category-btn"


onclick="filterMenu('veg',this)">



🥗 VEG BURGERS



</button>









<button


class="category-btn"


onclick="filterMenu('non-veg',this)">



🍗 NON VEG BURGERS



</button>






</div>









<!-- ===========================
     BURGER DISPLAY AREA

     Generated by script.js

=========================== -->



<section

class="menu-grid"

id="menuGrid">





</section>









<!-- ===========================
     CART BUTTON
=========================== -->


<div class="cart-button">





<button

onclick="goToCart()">





🛒 YOUR WAY TO CART






</button>





</div>









</div>







<script src="script.js"></script>



</body>


</html>
